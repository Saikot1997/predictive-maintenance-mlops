repos:
  # Black: Python code auto-format
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11

  # isort: Import গুলো sort করে
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Flake8: Code style ও error check
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--exclude=venv,__pycache__"]

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace     # Line ending এর extra space remove
      - id: end-of-file-fixer       # File এর শেষে newline ensure করে
      - id: check-yaml              # YAML file valid কি না check
      - id: check-json              # JSON file valid কি না check
      - id: check-merge-conflict    # Merge conflict marker আছে কি না
      - id: debug-statements        # পুরনো print/breakpoint remove
      - id: check-added-large-files # ৫০০KB+ file commit হতে দেবে না
        args: ["--maxkb=500"]