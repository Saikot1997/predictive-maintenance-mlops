name: CI — Test & Lint

# কখন চলবে: যেকোনো branch এ push বা PR create হলে
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      # Step 1: Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Python setup
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Step 3: Dependencies install
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Step 4: Code format check (Black)
      - name: Check code format (black)
        run: black --check src/ tests/

      # Step 5: Import sort check
      - name: Check import order (isort)
        run: isort --check-only --profile black src/ tests/

      # Step 6: Lint check (flake8)
      - name: Lint check (flake8)
        run: flake8 src/ tests/ --max-line-length=100

      # Step 7: Tests run করো
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      # Step 8: Coverage report upload (GitHub PR তে দেখা যাবে)
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Docker build test (আসল push নয়, শুধু build হয় কি না check)
  docker-build-check:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: predictive-maintenance:test
          cache-from: type=gha
          cache-to: type=gha,mode=max