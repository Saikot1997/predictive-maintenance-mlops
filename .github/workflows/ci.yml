name: CI - Test and Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check format (black)
        run: black --check src/ tests/

      - name: Check imports (isort)
        run: isort --check-only --profile black src/ tests/

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=100

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: predictive-maintenance:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  data-quality-check:
    name: Data Quality and Drift Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing to generate data
        run: python -m src.data.preprocess

      - name: Run Evidently drift check
        run: python -m src.monitoring.data_drift

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: data/reports/
          retention-days: 7
